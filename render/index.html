
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rendered Content</title>
  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 2rem;
    }
  </style>
</head>
<body>


<script>
  const b64 = window.location.hash.slice(1);

  if (b64) {
    try {
      const html = atob(b64);
      document.body.insertAdjacentHTML("beforeend", html);
    } catch (e) {
      document.body.textContent = "Invalid content.";
    }
  } else {
    document.body.textContent = "No content provided.";
  }

</script>

</body>
</html>
``
